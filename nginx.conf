server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para melhorar performance
    gzip on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;
    gzip_min_length 1000;

    # Cache para assets estáticos (Flutter gera hashes únicos)
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Roteamento SPA — todas as rotas não-arquivo voltam para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cabeçalhos de segurança básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
